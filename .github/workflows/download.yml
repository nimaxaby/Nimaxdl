name: 'دانلودر هوشمند فایل (نسخه نهایی)'

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'لینک مستقیم فایل'
        required: true
        type: string
      split_size:
        description: 'حداکثر حجم هر قسمت (MB)'
        required: true
        default: '90'
        type: string
      overwrite:
        description: 'در صورت وجود فایل قبلی با همین نام، آن را پاک کن (بازنویسی)؟'
        required: false
        default: false
        type: boolean
      file_password:
        description: 'رمز فایل (در صورت نیاز)'
        required: false
        type: string

jobs:
  download-and-split:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: دریافت کدهای مخزن
        uses: actions/checkout@v4

      # ========================== مرحله 0: بررسی وجود دایرکتوری تکراری ==========================
      - name: بررسی وجود دایرکتوری تکراری
        id: check
        run: |
          RAW_NAME=$(basename "${{ github.event.inputs.url }}")
          # حذف پسوند از نام فایل (برای همه فایل‌ها اعم از apk, zip, rar, ...)
          CLEAN_NAME="${RAW_NAME%.*}"
          echo "clean_name=$CLEAN_NAME" >> $GITHUB_OUTPUT
          
          TARGET_DIR="downloads/$CLEAN_NAME"
          if [ -d "$TARGET_DIR" ]; then
            echo "⚠️ هشدار: دایرکتوری $TARGET_DIR از قبل وجود دارد."
            if [ "${{ github.event.inputs.overwrite }}" == "true" ]; then
              echo "🗑️ حذف دایرکتوری قبلی به درخواست شما..."
              rm -rf "$TARGET_DIR"
              echo "✅ دایرکتوری قبلی حذف شد."
            else
              echo "❌ خطا: دایرکتوری هم‌نام وجود دارد و گزینه بازنویسی فعال نیست."
              echo "لطفاً یا گزینه 'overwrite' را فعال کنید یا نام فایل را تغییر دهید."
              exit 1
            fi
          else
            echo "✅ هیچ دایرکتوری تکراری یافت نشد."
          fi

      - name: ساخت پوشه موقت
        run: |
          mkdir -p downloads_temp
          mkdir -p downloads

      # ========================== مرحله 1: دانلود ==========================
      - name: 📥 مرحله 1/3 - دانلود فایل
        run: |
          echo "=========================================="
          echo "⬇️ شروع دانلود از: ${{ github.event.inputs.url }}"
          START_TIME=$(date +%s)
          curl -L --retry 3 --retry-delay 2 -o "downloads_temp/original_file" "${{ github.event.inputs.url }}"
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          FILE_SIZE=$(stat -c%s "downloads_temp/original_file")
          echo "✅ دانلود کامل شد در $DURATION ثانیه"
          echo "📦 حجم فایل: $(($FILE_SIZE / 1024 / 1024)) مگابایت"

      # ========================== مرحله 2: تقسیم فایل ==========================
      - name: ✂️ مرحله 2/3 - تقسیم فایل به قطعات
        id: split
        run: |
          cd downloads_temp
          SPLIT_SIZE_MB=${{ github.event.inputs.split_size }}
          SPLIT_SIZE_KB=$((SPLIT_SIZE_MB * 1024))
          
          CLEAN_NAME="${{ steps.check.outputs.clean_name }}"
          
          # تقسیم فایل به قطعات با پیشوند نام پاک شده
          split -b ${SPLIT_SIZE_KB}k --numeric-suffixes=1 --suffix-length=2 "original_file" "${CLEAN_NAME}_part_"
          
          PARTS_COUNT=$(ls ${CLEAN_NAME}_part_* | wc -l)
          echo "parts_count=$PARTS_COUNT" >> $GITHUB_OUTPUT
          
          # اگر فایل اصلی APK است، به قطعات پسوند اضافه نکن (جلوگیری از باز شدن خودکار در ویندوز/مک)
          if [[ "${{ github.event.inputs.url }}" == *.apk ]]; then
            echo "📱 فایل APK شناسایی شد. قطعات بدون پسوند zip ذخیره می‌شوند."
            # هیچ تغییری در نام قطعات ایجاد نمی‌کنیم
          else
            # برای سایر فایل‌ها، پسوند .zip را به قطعات اضافه می‌کنیم تا به راحتی قابل تشخیص باشند
            for file in ${CLEAN_NAME}_part_*; do
              mv "$file" "${file}.zip"
            done
          fi
          
          echo "✅ فایل به $PARTS_COUNT قسمت تقسیم شد."

      # ========================== مرحله 3: ذخیره نهایی و ساخت لینک ==========================
      - name: 💾 مرحله 3/3 - ذخیره در مخزن و ساخت لینک‌های قابل دانلود
        run: |
          CLEAN_NAME="${{ steps.check.outputs.clean_name }}"
          PARTS_COUNT=${{ steps.split.outputs.parts_count }}
          
          # ایجاد پوشه نهایی
          mkdir -p "downloads/$CLEAN_NAME"
          
          # کپی قطعات به پوشه نهایی
          if [[ "${{ github.event.inputs.url }}" == *.apk ]]; then
            cp downloads_temp/${CLEAN_NAME}_part_* "downloads/$CLEAN_NAME/"
          else
            cp downloads_temp/${CLEAN_NAME}_part_*.zip "downloads/$CLEAN_NAME/"
          fi
          
          # رفتن به پوشه نهایی
          cd "downloads/$CLEAN_NAME"
          
          # ساخت فایل CSV با لینک‌های مستقیم (قابل استفاده در ایران)
          echo "نام قسمت,حداکثر حجم (MB),لینک دانلود مستقیم" > links.csv
          
          # حلقه برای تولید لینک هر قسمت
          for i in $(seq -f "%02g" 1 $PARTS_COUNT); do
            if [[ "${{ github.event.inputs.url }}" == *.apk ]]; then
              PART_FILE="${CLEAN_NAME}_part_${i}"
            else
              PART_FILE="${CLEAN_NAME}_part_${i}.zip"
            fi
            echo "قسمت $i از $PARTS_COUNT,${{ github.event.inputs.split_size}},https://github.com/${{ github.repository }}/blob/main/downloads/$CLEAN_NAME/$PART_FILE?raw=true" >> links.csv
          done
          
          # ساخت فایل readme.txt با دستور العمل چسباندن قطعات
          echo "🔧 راهنمای چسباندن قطعات برای بدست آوردن فایل اصلی:" > readme.txt
          echo "" >> readme.txt
          echo "در لینوکس / macOS:" >> readme.txt
          if [[ "${{ github.event.inputs.url }}" == *.apk ]]; then
            echo "  cat ${CLEAN_NAME}_part_* > $CLEAN_NAME.apk" >> readme.txt
          else
            echo "  cat ${CLEAN_NAME}_part_*.zip > $CLEAN_NAME.${RAW_EXT}" >> readme.txt
          fi
          echo "" >> readme.txt
          echo "در ویندوز (Command Prompt):" >> readme.txt
          if [[ "${{ github.event.inputs.url }}" == *.apk ]]; then
            echo "  copy /b ${CLEAN_NAME}_part_* $CLEAN_NAME.apk" >> readme.txt
          else
            echo "  copy /b ${CLEAN_NAME}_part_*.zip $CLEAN_NAME.${RAW_EXT}" >> readme.txt
          fi
          echo "" >> readme.txt
          echo "پس از چسباندن، فایل نهایی را با نرم‌افزار مناسب باز کنید." >> readme.txt
          
          echo "✅ فایل‌ها در downloads/$CLEAN_NAME ذخیره شدند."

      # ========================== ارسال به مخزن ==========================
      - name: 📤 commit و push نهایی
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add downloads/ -f
          git commit -m "دانلود: ${{ steps.check.outputs.clean_name }} (قطعات: ${{ steps.split.outputs.parts_count }})" || echo "تغییری وجود ندارد"
          git push
          
      # ========================== نمایش خلاصه نهایی ==========================
      - name: 📊 نمایش خلاصه نهایی
        run: |
          echo ""
          echo "=========================================="
          echo "✅ فرآیند دانلود با موفقیت کامل شد! ✅"
          echo "=========================================="
          echo "📁 نام فایل: ${{ steps.check.outputs.clean_name }}"
          echo "📦 تعداد قطعات: ${{ steps.split.outputs.parts_count }}"
          echo "📂 مسیر ذخیره: downloads/${{ steps.check.outputs.clean_name }}/"
          echo ""
          echo "🔗 لینک قطعات در فایل links.csv موجود در همان مسیر است."
          echo "🔄 نحوه چسباندن قطعات:"
          echo "   cat downloads/${{ steps.check.outputs.clean_name }}/* > فایل_نهایی"
          echo "=========================================="
