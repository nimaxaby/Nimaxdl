name: 'Simple Downloader'

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'لینک مستقیم فایل'
        required: true
        type: string
      split_size:
        description: 'حداکثر حجم هر قسمت (MB)'
        required: false
        default: '95'
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y zip curl

      - name: Download file
        run: |
          mkdir -p downloads_temp
          cd downloads_temp
          curl -L -o file "${{ github.event.inputs.url }}"
          echo "Download completed"
          ls -la

      - name: Split file into parts
        run: |
          SPLIT_SIZE="${{ github.event.inputs.split_size }}"
          mkdir -p downloads
          cd downloads_temp
          # Get filename without extension
          BASENAME=$(basename "${{ github.event.inputs.url }}" | sed 's/[?#].*//')
          NAME="${BASENAME%.*}"
          mkdir -p "../downloads/$NAME"
          zip -s ${SPLIT_SIZE}m "../downloads/$NAME/${NAME}.zip" file
          cd ..
          rm -rf downloads_temp

      - name: Create links.csv
        run: |
          cd downloads
          for dir in */; do
            cd "$dir"
            echo "نام قطعه,لینک (کلیک و View Raw)" > links.csv
            for part in *.zip *.z[0-9]*; do
              if [ -f "$part" ]; then
                echo "$part,https://github.com/${{ github.repository }}/blob/main/downloads/$dir$part" >> links.csv
              fi
            done
            cd ..
          done

      - name: Push to repository
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add downloads/
          git commit -m "Add downloaded file" || echo "No changes"
          git push
